; ==========================================================
; 3) Default / 漏网之鱼
; ==========================================================
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🌐 Default`select`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]♻️ 自动选择`[]🧭 手动选择`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]♻️ 自动选择`[]🧊 冷门节点`[]🧭 手动选择`[]🚀 手动选择

; ==========================================================
; 4) 非标端口
; ==========================================================
custom_proxy_group=🔀 非标端口`select`[]🐟 遵循规则`[]DIRECT
custom_proxy_group=🐟 遵循规则`select`[]🐟 漏网之鱼

; ==========================================================
; 5) 国家节点测速组
; ==========================================================
custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇯🇵 JP`url-test`(?i)(日本|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 US`url-test`(?i)(美国|美西|美东|US|USA|United States|America|Los Angeles|San Jose|Seattle|New York)`http://www.gstatic.com/generate_204`300,,50

; 冷门节点：排除 JP / US 后剩余节点
custom_proxy_group=🧊 冷门节点`select`(?i)^(?!.*(日本|JP|Japan|Tokyo|Osaka|美国|美西|美东|US|USA|United States|America|Los Angeles|San Jose|Seattle|New York)).*