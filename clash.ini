custom_proxy_group=🎵 TikTok`select`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=📸 Instagram`select`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🐦 X`select`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default

custom_proxy_group=🧑‍💻 GitHub`select`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
custom_proxy_group=🚝 测速工具`select`[]DIRECT`[]🇯🇵 JP`[]🇺🇸 US`[]🧊 冷门节点`[]🧭 手动选择`[]♻️ 自动选择`[]🌐 Default
